name: Package & Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from TOC
        id: version
        run: |
          VERSION=$(grep "^## Version:" RepuTracker.toc | sed 's/## Version: //')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          ADDON_NAME="RepuTracker"
          mkdir -p /tmp/addon-build/$ADDON_NAME

          cp RepuTracker.toc Core.lua Data.lua UI.lua README.md \
             /tmp/addon-build/$ADDON_NAME/

          cd /tmp/addon-build
          zip -r "$GITHUB_WORKSPACE/RepuTracker.zip" $ADDON_NAME

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: RepuTracker v${{ steps.version.outputs.version }}
          files: RepuTracker.zip
          generate_release_notes: true
